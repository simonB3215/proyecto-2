[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Esto asegura que si haces una aplicación SPA, las URL internas funcionen correctamente.
  # Aunque es una landing page, es buena práctica para asegurar que cualquier ruta recaiga en index.html
  from = "/*"
  to = "/index.html"
  status = 200
